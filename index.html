<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        button {
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<header>
    <h1>Application de gestion</h1>
</header>

<div class="container">
    <h2>Bienvenue</h2>
    <p>Ceci est une application locale simple.</p>
    
    <button onclick="ajouterProduit()">Ajouter un produit</button>
</div>

<script>
    function ajouterProduit() {
        alert("Fonction à développer !");
    }
</script>

</body>
</html>
